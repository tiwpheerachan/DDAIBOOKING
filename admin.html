<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDPAI Admin — จัดการระบบจองติดตั้ง</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">
      <img src="https://bsta.sa/images/feature_variant/5/ddbai-400x120-logo.png" alt="DDPAI" class="navbar-logo-img">
      <div class="navbar-divider"></div>
      <div class="navbar-text">
        <div class="title">Admin Panel</div>
        <div class="subtitle">ระบบจัดการจองติดตั้ง</div>
      </div>
    </div>
    <a href="index.html" class="navbar-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <path d="M16 2v4M8 2v4M3 10h18"/>
      </svg>
      หน้าจองลูกค้า
    </a>
  </nav>

  <!-- Tabs -->
  <div class="tab-bar" id="tabBar"></div>

  <!-- Page Content -->
  <div class="page" id="pageContent"></div>

  <!-- Booking Modal -->
  <div class="modal-overlay" id="bookingModal">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>จองให้ลูกค้า</h3>
        <button class="modal-close" onclick="closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/shared-data.js"></script>
  <script src="js/admin-panel.js"></script>

</body>
</html>
